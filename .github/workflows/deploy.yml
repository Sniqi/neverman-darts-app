name: Deploy to GitHub Pages

on:
  push:
    # Deploy from whichever default branch the repo uses (new GitHub repos default
    # to `main`; this project's local branch is `master`). Covers both (WR-02).
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        # Enables Pages on first deploy and surfaces base_path (WR-04).
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
          # Cast Application ID injected from a repo VARIABLE (not a secret) — the App ID
          # ships in the client bundle and is not sensitive (D-09/SETUP-02).
          # Set via: Settings → Secrets and variables → Actions → Variables → VITE_CAST_APP_ID
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
